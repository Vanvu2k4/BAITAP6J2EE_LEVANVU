<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f4f9, #e6ecf5);
        }

        .detail-card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .order-header {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
        }

        .order-info {
            padding: 20px;
            background: white;
            border-radius: 0 0 15px 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #0d6efd;
        }

        .badge-status {
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 500;
        }

        .badge-pending {
            background: #ffc107;
            color: #000;
        }

        .badge-completed {
            background: #28a745;
            color: white;
        }

        .badge-cancelled {
            background: #dc3545;
            color: white;
        }

        .item-table {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .item-table thead {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
        }

        .product-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .summary-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-row.total {
            font-weight: bold;
            font-size: 18px;
            color: #0d6efd;
            border: none;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title"><i class="bi bi-receipt"></i> Order Details</h2>
        <a th:href="@{/orders}" class="btn btn-primary btn-custom shadow">
            <i class="bi bi-arrow-left"></i> Back to Orders
        </a>
    </div>

    <!-- ORDER INFO SECTION -->
    <div class="detail-card">
        <div class="order-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="mb-2">Order #<span th:text="${order.id}"></span></h3>
                    <p class="mb-0" th:text="${#temporals.format(order.orderDate, 'EEEE, MMMM dd, yyyy')}"></p>
                </div>
                <div>
                    <span class="badge-status"
                          th:classappend="${order.status == 'PENDING' ? 'badge-pending' : order.status == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled'}"
                          th:text="${order.status}"></span>
                </div>
            </div>
        </div>

        <div class="order-info">
            <div class="row">
                <div class="col-md-6">
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-person"></i> Customer Name</span>
                        <span class="info-value" th:text="${order.account.loginName}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-envelope"></i> Email</span>
                        <span class="info-value" th:text="${order.account.email != null ? order.account.email : 'N/A'}"></span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-calendar-event"></i> Order Date</span>
                        <span class="info-value" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-box-seam"></i> Total Items</span>
                        <span class="info-value" th:text="${order.orderDetails.size()}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ORDER ITEMS SECTION -->
    <div class="detail-card">
        <table class="table text-center align-middle mb-0 item-table">
            <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="detail : ${order.orderDetails}">
                <td class="text-start">
                    <div class="d-flex align-items-center">
                        <img th:if="${detail.product.image != null}"
                             th:src="@{'/uploads/' + ${detail.product.image}}"
                             class="product-img me-3 shadow-sm">

                        <img th:if="${detail.product.image == null}"
                             src="https://via.placeholder.com/80?text=No+Image"
                             class="product-img me-3 shadow-sm">

                        <span th:text="${detail.product.name}"></span>
                    </div>
                </td>
                <td class="fw-bold" th:text="${#numbers.formatDecimal(detail.price,0,'COMMA',0,'POINT')} + ' VND'"></td>
                <td th:text="${detail.quantity}"></td>
                <td class="text-primary fw-bold" th:text="${#numbers.formatDecimal(detail.totalPrice,0,'COMMA',0,'POINT')} + ' VND'"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="row">
        <div class="col-lg-6"></div>
        <div class="col-lg-6">
            <div class="summary-box">
                <h5 class="mb-3"><i class="bi bi-calculator"></i> Order Summary</h5>

                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span th:text="${#numbers.formatDecimal(order.totalPrice,0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="summary-row">
                    <span>Shipping:</span>
                    <span class="text-success">Free</span>
                </div>

                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span th:text="${#numbers.formatDecimal(order.totalPrice * 0.1,0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="summary-row total">
                    <span>Total Amount:</span>
                    <span th:text="${#numbers.formatDecimal(order.totalPrice + (order.totalPrice * 0.1),0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="mt-4">
                    <a th:href="@{/orders}"
                       class="btn btn-outline-primary btn-custom w-100">
                        <i class="bi bi-arrow-left"></i> Back to Orders
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
