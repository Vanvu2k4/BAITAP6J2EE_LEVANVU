<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quan ly don hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f4f9, #e6ecf5);
        }

        .main-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table thead {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
        }

        .table tbody tr {
            transition: all 0.2s ease-in-out;
        }

        .table tbody tr:hover {
            background-color: #f1f7ff;
            transform: scale(1.01);
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 500;
        }

        .badge-pending {
            background: #ffc107;
            color: #000;
        }

        .badge-completed {
            background: #28a745;
            color: white;
        }

        .badge-cancelled {
            background: #dc3545;
            color: white;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 60px;
            color: #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title"><i class="bi bi-receipt"></i> Quan ly don hang</h2>
        <a th:href="@{/products}" class="btn btn-primary btn-custom shadow">
            <i class="bi bi-arrow-left"></i> Ve san pham
        </a>
    </div>

    <!-- CARD -->
    <div class="card shadow-lg border-0 main-card">
        <div class="card-body p-0">

            <div th:if="${!orders.isEmpty()}">
                <table class="table text-center align-middle mb-0">

                    <thead>
                    <tr>
                        <th>Ma don</th>
                        <th>Khach hang</th>
                        <th>Ngay dat</th>
                        <th>Tong tien</th>
                        <th>So mon</th>
                        <th>Trang thai</th>
                        <th width="150">Tac vu</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="order : ${orders}">
                        <td class="fw-bold">#<span th:text="${order.id}"></span></td>
                        <td th:text="${order.account.username}"></td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-primary fw-bold" th:text="${#numbers.formatDecimal(order.totalPrice,0,'COMMA',0,'POINT')} + ' VND'"></td>
                        <td th:text="${order.orderDetails.size()}"></td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${order.status == 'PENDING' ? 'badge-pending' : order.status == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled'}"
                                  th:text="${order.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${order.id})}"
                               class="btn btn-info btn-sm btn-custom me-1">
                                <i class="bi bi-eye"></i> Xem
                            </a>

                            <a th:href="@{/orders/cancel/{id}(id=${order.id})}"
                               class="btn btn-danger btn-sm btn-custom"
                               th:if="${order.status != 'COMPLETED' && order.status != 'CANCELLED'}"
                               onclick="return confirm('Ban co chac chan muon huy don?')">
                                <i class="bi bi-x-circle"></i> Huy
                            </a>
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>

            <div th:if="${orders.isEmpty()}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <h5 class="mt-3">Chua co don hang</h5>
                <p class="text-muted">Hay dat don hang dau tien cua ban.</p>
                <a th:href="@{/products}" class="btn btn-primary btn-custom mt-3">
                    <i class="bi bi-shop"></i> Mua sam ngay
                </a>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
