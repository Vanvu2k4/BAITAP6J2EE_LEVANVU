<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Them san pham</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow-lg">
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">Them san pham moi</h4>
    </div>

    <div class="card-body">

      <form th:action="@{/products/add}"
            th:object="${product}"
            method="post"
            enctype="multipart/form-data">

        <div class="mb-3">
          <label class="form-label">Ten san pham</label>
          <input type="text" class="form-control" th:field="*{name}">
          <div class="text-danger small" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Gia</label>
          <input type="number" class="form-control" th:field="*{price}">
          <div class="text-danger small" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Hinh anh</label>
          <input type="file" class="form-control" name="imageFile">
        </div>

        <div class="mb-3">
          <label class="form-label">Danh muc</label>
          <select class="form-select" name="categoryId">
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
          </select>
        </div>

        <div class="d-flex justify-content-between">
          <a th:href="@{/products}" class="btn btn-secondary">Quay lai</a>
          <button type="submit" class="btn btn-success">Luu san pham</button>
        </div>

      </form>

    </div>
  </div>

</div>

</body>
</html>
