<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-warning">
            <h4>Edit Product</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/products/edit}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" class="form-control" th:field="*{name}">
                    <div class="text-danger" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label>Price</label>
                    <input type="number" class="form-control" th:field="*{price}">
                    <div class="text-danger" th:errors="*{price}"></div>
                </div>

                <!-- ✅ FIX ẢNH Ở ĐÂY -->
                <div class="mb-3">
                    <label>Current Image</label><br>

                    <img th:if="${product.image != null}"
                         th:src="@{'/uploads/' + ${product.image}}"
                         style="width:130px;height:90px;object-fit:cover"
                         class="rounded shadow border">

                    <span th:if="${product.image == null}" class="text-muted">
                        No Image
                    </span>
                </div>

                <div class="mb-3">
                    <label>New Image</label>
                    <input type="file" class="form-control" name="imageFile">
                </div>

                <div class="mb-3">
                    <label>Category</label>
                    <select class="form-select" name="categoryId">
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${product.category != null and c.id == product.category.id}">
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/products}" class="btn btn-secondary">Back</a>
                    <button type="submit" class="btn btn-warning">Update</button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
