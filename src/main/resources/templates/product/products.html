<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f4f9, #e6ecf5);
        }

        .main-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
        }

        .table tbody tr {
            transition: all 0.2s ease-in-out;
        }

        .table tbody tr:hover {
            background-color: #f1f7ff;
            transform: scale(1.01);
        }

        .product-img {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .badge-category {
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 500;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Product Management</h2>
        <a th:href="@{/products/add}" class="btn btn-primary btn-custom shadow">
            <i class="bi bi-plus-circle"></i> Create Product
        </a>
    </div>

    <!-- CARD -->
    <div class="card shadow-lg border-0 main-card">
        <div class="card-body p-0">

            <table class="table text-center align-middle mb-0">

                <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Image</th>
                    <th>Category</th>
                    <th width="200">Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="p : ${listProduct}">
                    <td class="fw-semibold" th:text="${p.name}"></td>

                    <td class="fw-bold text-primary"
                        th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')}">
                    </td>

                    <td>
                        <img th:if="${p.image != null}"
                             th:src="@{'/uploads/' + ${p.image}}"
                             class="product-img shadow-sm">

                        <span th:if="${p.image == null}" class="text-muted">
                            No Image
                        </span>
                    </td>

                    <td>
                        <span class="badge-category"
                              th:text="${p.category.name}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/products/edit/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm btn-custom me-2">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm btn-custom"
                           onclick="return confirm('Are you sure?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(listProduct)}">
                    <td colspan="5" class="text-muted py-4">
                        <i class="bi bi-box-seam"></i> No products available
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
