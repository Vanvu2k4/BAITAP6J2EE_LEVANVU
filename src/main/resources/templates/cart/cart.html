<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f4f9, #e6ecf5);
        }

        .cart-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cart-item {
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 0;
            transition: all 0.2s;
        }

        .cart-item:hover {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .summary-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-row.total {
            font-weight: bold;
            font-size: 20px;
            color: #0d6efd;
            border: none;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
        }

        .empty-cart i {
            font-size: 80px;
            color: #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="page-title"><i class="bi bi-cart-check"></i> Shopping Cart</h2>
        <a th:href="@{/products}" class="btn btn-primary btn-custom shadow">
            <i class="bi bi-arrow-left"></i> Continue Shopping
        </a>
    </div>

    <div class="row">

        <!-- CART ITEMS -->
        <div class="col-lg-8">
            <div class="cart-card">
                <div class="card-body p-4">

                    <!-- CART ITEMS SECTION -->
                    <div th:if="${!cartDetails.isEmpty()}">
                        <h5 class="mb-4"><i class="bi bi-list-check"></i> Your Items</h5>

                        <div th:each="entry : ${cartDetails.entrySet()}">
                            <div class="cart-item d-flex justify-content-between align-items-center">
                                <!-- Product Info -->
                                <div class="d-flex align-items-center" style="flex: 1;">
                                    <img th:if="${entry.key.image != null}"
                                         th:src="@{'/uploads/' + ${entry.key.image}}"
                                         class="product-img me-3 shadow-sm"
                                         alt="Product Image">

                                    <img th:if="${entry.key.image == null}"
                                         src="https://via.placeholder.com/100?text=No+Image"
                                         class="product-img me-3 shadow-sm"
                                         alt="No Image">

                                    <div>
                                        <h6 class="mb-1" th:text="${entry.key.name}"></h6>
                                        <p class="text-muted mb-0">
                                            Price: <span class="fw-bold" th:text="${#numbers.formatDecimal(entry.key.price,0,'COMMA',0,'POINT')} + ' VND'"></span>
                                        </p>
                                    </div>
                                </div>

                                <!-- Quantity & Subtotal -->
                                <div class="d-flex align-items-center gap-3 me-3" style="min-width: 300px;">
                                    <form th:action="@{/cart/update-quantity/{id}(id=${entry.key.id})}" method="post" class="d-flex align-items-center gap-2">
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="decreaseQty(this)">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" name="quantity" class="form-control text-center qty-input"
                                               th:value="${entry.value}"
                                               min="1"
                                               style="width: 60px;">
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="increaseQty(this)">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                        <button type="submit" class="btn btn-sm btn-info">Update</button>
                                    </form>

                                    <div class="text-end" style="min-width: 120px;">
                                        <p class="mb-0"><strong th:text="${#numbers.formatDecimal(entry.key.price * entry.value,0,'COMMA',0,'POINT')} + ' VND'"></strong></p>
                                        <small class="text-muted" th:text="'Qty: ' + ${entry.value}"></small>
                                    </div>
                                </div>

                                <!-- Remove Button -->
                                <a th:href="@{/cart/remove/{id}(id=${entry.key.id})}"
                                   class="btn btn-danger btn-sm btn-custom"
                                   onclick="return confirm('Remove from cart?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </div>

                        <!-- Clear Cart Button -->
                        <div class="mt-4 pt-3 border-top">
                            <a th:href="@{/cart/clear}"
                               class="btn btn-outline-danger btn-custom"
                               onclick="return confirm('Clear entire cart?')">
                                <i class="bi bi-x-circle"></i> Clear Cart
                            </a>
                        </div>

                    </div>

                    <!-- EMPTY CART MESSAGE -->
                    <div th:if="${cartDetails.isEmpty()}" class="empty-cart">
                        <i class="bi bi-cart-x"></i>
                        <h5 class="mt-3">Your cart is empty</h5>
                        <p class="text-muted">Start adding products to your cart!</p>
                        <a th:href="@{/products}" class="btn btn-primary btn-custom mt-3">
                            <i class="bi bi-shop"></i> Continue Shopping
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="col-lg-4">
            <div class="summary-card">
                <h5 class="mb-4"><i class="bi bi-receipt"></i> Order Summary</h5>

                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span th:text="${#numbers.formatDecimal(totalPrice,0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="summary-row">
                    <span>Shipping:</span>
                    <span class="text-success">Free</span>
                </div>

                <div class="summary-row">
                    <span>Tax:</span>
                    <span th:text="${#numbers.formatDecimal(totalPrice * 0.1,0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="summary-row total">
                    <span>Total:</span>
                    <span th:text="${#numbers.formatDecimal(totalPrice + (totalPrice * 0.1),0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="mt-4" th:if="${!cartDetails.isEmpty()}">
                    <a th:href="@{/orders/checkout}" class="btn btn-success btn-custom w-100 btn-lg">
                        <i class="bi bi-check-circle"></i> Proceed to Checkout
                    </a>
                </div>

                <div class="mt-4" th:if="${cartDetails.isEmpty()}">
                    <button class="btn btn-success btn-custom w-100 btn-lg" disabled>
                        <i class="bi bi-lock"></i> Cart is Empty
                    </button>
                </div>

                <a th:href="@{/products}" class="btn btn-outline-primary btn-custom w-100 mt-2">
                    <i class="bi bi-arrow-left"></i> Back to Products
                </a>

            </div>
        </div>

    </div>

</div>

<script>
    function increaseQty(button) {
        const input = button.previousElementSibling;
        input.value = parseInt(input.value) + 1;
    }

    function decreaseQty(button) {
        const input = button.nextElementSibling;
        if (parseInt(input.value) > 1) {
            input.value = parseInt(input.value) - 1;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
