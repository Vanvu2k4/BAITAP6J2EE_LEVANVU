<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dang ky tai khoan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Dang ky tai khoan</h4>
                </div>
                <div class="card-body">
                    <div th:if="${registerError}" class="alert alert-danger" th:text="${registerError}"></div>

                    <form th:action="@{/register}" th:object="${registerForm}" method="post">
                        <div class="mb-3">
                            <label for="loginName" class="form-label">Login name</label>
                            <input type="text" id="loginName" class="form-control" th:field="*{loginName}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('loginName')}" th:errors="*{loginName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Ten hien thi</label>
                            <input type="text" id="username" class="form-control" th:field="*{username}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" th:field="*{email}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Mat khau</label>
                            <input type="password" id="password" class="form-control" th:field="*{password}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Nhap lai mat khau</label>
                            <input type="password" id="confirmPassword" class="form-control" th:field="*{confirmPassword}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Dang ky</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}">Da co tai khoan? Dang nhap</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
